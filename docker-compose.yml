services:
  service-url-shortener-db:
    image: postgres:17-alpine
    container_name: url-shortener-db
    environment:
      - POSTGRES_DB=$POSTGRES_DB
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
    ports:
      - "$POSTGRES_PORT:5432"
    volumes:
      - pgdata-service-url-shortener:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
  service-url-shortener-app-go:
    build:
      context: .
      dockerfile: Dockerfile
    image: aygumov-g/service-url-shortener-app-go:latest
    container_name: url-shortener-app-go
    environment:
      - APP_PORT=$APP_PORT
      - APP_DOMAIN=$APP_DOMAIN
      - POSTGRES_HOST=$POSTGRES_HOST
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_DB=$POSTGRES_DB
      - SHORT_CODE_ALPHABET=$SHORT_CODE_ALPHABET
      - SHORT_CODE_SECRET=$SHORT_CODE_SECRET
    ports:
      - "$APP_PORT:$APP_PORT"
    depends_on:
      service-url-shortener-db:
        condition: service_healthy
    restart: always

volumes:
  pgdata-service-url-shortener:
